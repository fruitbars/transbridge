version: '3.8'

services:
  transbridge:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        COMMIT_HASH: ${COMMIT_HASH:-unknown}
    image: transbridge:${TAG:-latest}
    container_name: transbridge
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ${CONFIG_FILE:-./config.yml}:/app/config.yml
      - ${LOGS_DIR:-./logs}:/app/logs
      - ${CACHE_DIR:-./cache}:/app/cache
    environment:
      - TZ=Asia/Shanghai
    networks:
      - transbridge-network
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Redis 缓存服务（可选）：需要共享缓存时执行 `docker-compose --profile redis up -d`
  redis:
    image: redis:alpine
    profiles: ["redis"]
    container_name: transbridge-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - transbridge-network
    command: redis-server --appendonly yes
    # 健康检查
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  transbridge-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
