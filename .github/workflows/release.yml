name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for multiple platforms
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          mkdir -p dist
          # Using GITHUB_REF_NAME is cleaner for getting the tag name directly
          VERSION_TAG=${GITHUB_REF_NAME} 
          APP_NAME=transbridge
          
          OUT_BASE_NAME="${APP_NAME}-${VERSION_TAG}-${{ matrix.goos }}-${{ matrix.goarch }}"
          
          ACTUAL_BIN_NAME=$OUT_BASE_NAME
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ACTUAL_BIN_NAME="$ACTUAL_BIN_NAME.exe"
          fi
          
          echo "OUT_BASE_NAME=${OUT_BASE_NAME}" >> $GITHUB_ENV
          echo "ACTUAL_BIN_NAME=${ACTUAL_BIN_NAME}" >> $GITHUB_ENV
          
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o "dist/${ACTUAL_BIN_NAME}" .

      - name: Archive as .tar.gz
        env:
          OUT_BASE_NAME: ${{ env.OUT_BASE_NAME }}
          ACTUAL_BIN_NAME: ${{ env.ACTUAL_BIN_NAME }}
        run: |
          cd dist
          tar -czf "${OUT_BASE_NAME}.tar.gz" "${ACTUAL_BIN_NAME}"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
