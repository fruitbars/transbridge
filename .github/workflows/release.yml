name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Test
        run: go test ./...

  binaries:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
          - goos: windows
            goarch: arm64
            ext: ".exe"
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          BUILD_TIME="$(date -u '+%Y-%m-%d_%H:%M:%S')"
          COMMIT_HASH="$(git rev-parse --short HEAD)"
          OUT="transbridge-${VERSION}-${GOOS}-${GOARCH}${{ matrix.ext }}"
          LDFLAGS="-w -s -X main.Version=${VERSION} -X main.BuildTime=${BUILD_TIME} -X main.GitCommit=${COMMIT_HASH}"
          mkdir -p dist/package
          go build -ldflags "${LDFLAGS}" -o "dist/package/${OUT}" .
          cp config.example.yml README.md LICENSE dist/package/
          cp config_transbrige.yml config_transbrige_ollama.yml dist/package/ 2>/dev/null || true
          cp install-transbridge.sh dist/package/ 2>/dev/null || true
          mkdir -p dist/package/docs
          cp docs/*.md dist/package/docs/

      - name: Archive tar.gz
        if: matrix.archive == 'tar.gz'
        run: |
          set -euo pipefail
          cd dist/package
          tar -czf "../transbridge-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" .

      - name: Archive zip
        if: matrix.archive == 'zip'
        run: |
          set -euo pipefail
          cd dist/package
          zip -r "../transbridge-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: transbridge-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/transbridge-*
          if-no-files-found: error

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: binaries
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.ref_name }}
            ${{ steps.image.outputs.name }}:latest
