cases:
  # 基础翻译场景
  - name: "简单问候"
    text: "Hello, how are you?"
    source_lang: "en"
    target_lang: "zh"
    expected: ""
    category: "translate"

  - name: "日常对话"
    text: "Thank you for your help"
    source_lang: "en"
    target_lang: "zh"
    expected: ""
    category: "translate"

  - name: "技术文档"
    text: "This function returns a boolean value"
    source_lang: "en"
    target_lang: "zh"
    expected: ""
    category: "translate"

  - name: "中译英"
    text: "今天天气很好"
    source_lang: "zh"
    target_lang: "en"
    expected: ""
    category: "translate"

  # 专有名词保留场景
  - name: "公司名称"
    text: "OpenAI released GPT-4"
    source_lang: "en"
    target_lang: "zh"
    expected: ""
    category: "translate"

  - name: "技术品牌"
    text: "Install Docker and Kubernetes"
    source_lang: "en"
    target_lang: "zh"
    expected: ""
    category: "translate"

  # 不应翻译的场景（期望保留原样）
  - name: "纯文件名"
    text: "main.go"
    source_lang: "en"
    target_lang: "zh"
    expected: "main.go"
    category: "preserve"

  - name: "化学式"
    text: "H2SO4"
    source_lang: "en"
    target_lang: "zh"
    expected: "H2SO4"
    category: "preserve"

  - name: "数学公式"
    text: "E=mc²"
    source_lang: "en"
    target_lang: "zh"
    expected: "E=mc²"
    category: "preserve"

  - name: "单位数值"
    text: "5kg"
    source_lang: "en"
    target_lang: "zh"
    expected: "5kg"
    category: "preserve"

  - name: "版本号"
    text: "v1.2.3"
    source_lang: "en"
    target_lang: "zh"
    expected: "v1.2.3"
    category: "preserve"

  - name: "URL地址"
    text: "https://example.com/api/v1"
    source_lang: "en"
    target_lang: "zh"
    expected: "https://example.com/api/v1"
    category: "preserve"

  - name: "纯数字"
    text: "3.14159"
    source_lang: "en"
    target_lang: "zh"
    expected: "3.14159"
    category: "preserve"

  - name: "代码标识符"
    text: "getUserName()"
    source_lang: "en"
    target_lang: "zh"
    expected: "getUserName()"
    category: "preserve"

  # 混合内容场景
  - name: "文本含文件名"
    text: "Please check the config.yml file"
    source_lang: "en"
    target_lang: "zh"
    expected: ""
    category: "translate"

  - name: "文本含技术术语"
    text: "Configure the database connection string"
    source_lang: "en"
    target_lang: "zh"
    expected: ""
    category: "translate"

  - name: "错误信息"
    text: "Error: file not found"
    source_lang: "en"
    target_lang: "zh"
    expected: ""
    category: "translate"
